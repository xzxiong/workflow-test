name: Restore MO Data
on:
  workflow_dispatch:
    inputs:
      backup_env:
        description: 'Backup source environment (where data comes from)'
        required: true
        type: choice
        options:
          - prod
          - dev
        default: prod
      env:
        description: 'Restore target environment (where data goes to)'
        required: true
        type: choice
        options:
          - dev
          - qa
        default: dev
      backup_s3_bucket:
        description: Backups to be made into the S3 bucket
        required: false
        type: string
      backup_s3_bucket_file_path:
        description: Backups to be made into the S3 bucket path
        required: false
        type: string
      backup_id:
        description: Backup id
        required: false
        type: string
      restore_cluster:
        description: The cluster to be restored
        required: false
        type: string
        default: only-restore-data
      restore_cluster_version:
        description: The cluster version to be restored
        required: false
        type: string
        default: 'nightly-9d616832a'
      restore_s3_bucket:
        description: The S3 bucket to restore
        required: false
        type: string
        default: 'moc-backup-test'
      restore_s3_bucket_file_path:
        description: The S3 bucket path to restore
        required: false
        type: string
env:
  normal_email_1: ${{ vars.UPGRADE_TEST_EMAIL }}
  normal_password_1: ${{ secrets.UPGRADE_TEST_PASSWORD }}
  database_platform_password: ${{ secrets.DATABASE_PLATFORM_PASSWORD }}
  management_platform_url: ${{ secrets.MANAGEMENT_PLATFORM_URL }}
  management_platform_user: ${{ secrets.MANAGEMENT_PLATFORM_USER }}
  management_platform_password: ${{ secrets.MANAGEMENT_PLATFORM_PASSWORD }}
  env: ${{ inputs.env || 'dev' }}
  provider: aliyun
  region: cn-hangzhou
  k8s_unit_config: ${{ secrets.K8S_UNIT_CONFIG }}
  k8s_controller_config: ${{ secrets.K8S_CONTROLLER_CONFIG }}
jobs:
    restore-data:
      runs-on: ubuntu-latest
      environment:
        name: ${{ inputs.env || 'dev' }}
      timeout-minutes: 720
  
      steps:
        - name: Checkout
          uses: actions/checkout@v4
          with:
            repository: matrixorigin/mocloud-tester
            ref: main
            token: ${{ secrets.GH_PAT }}
  
        - name: Set Up Python3.11
          uses: actions/setup-python@v6
          with:
            python-version: '3.11'
  
        - name: Install Python Dependencies
          run: |
            cd $GITHUB_WORKSPACE
            python -m pip install --upgrade pip
            pip install -r requirements.txt

        - name: Set Restore File Path
          id: set-restore-path
          run: |
            if [ -n "${{ inputs.restore_s3_bucket_file_path }}" ]; then
              echo "path=${{ inputs.restore_s3_bucket_file_path }}" >> $GITHUB_OUTPUT
            else
              BACKUP_ENV="${{ inputs.backup_env || 'prod' }}"
              RESTORE_ENV="${{ inputs.env || 'dev' }}"
              TS=$(date +%Y%m%d%H%M%S)
              if [ "$BACKUP_ENV" = "dev" ] && [ "$RESTORE_ENV" = "dev" ]; then
                echo "path=restore-dev2dev-${TS}" >> $GITHUB_OUTPUT
              else
                echo "path=restore-${RESTORE_ENV}-${TS}" >> $GITHUB_OUTPUT
              fi
            fi

        - name: Restore MOC Data (from prod)
          id: restore-prod
          if: inputs.backup_env != 'dev'
          run: |
            cd $GITHUB_WORKSPACE
            export PYTHONPATH=$(pwd)
            python src/upgrade/main.py restore --only-data
          env:
            BACKUP_ALIYUN_AK: ${{ secrets.BACKUP_ALIYUN_AK }}
            BACKUP_ALIYUN_SK: ${{ secrets.BACKUP_ALIYUN_SK }}
            RESTORE_ALIYUN_AK: ${{ secrets.RESTORE_ALIYUN_AK }}
            RESTORE_ALIYUN_SK: ${{ secrets.RESTORE_ALIYUN_SK }}
            BACKUP_S3_BUCKET: ${{ inputs.backup_s3_bucket || vars.BACKUP_S3_BUCKET }}
            BACKUP_S3_BUCKET_FILE_PATH: ${{ inputs.backup_s3_bucket_file_path || vars.BACKUP_S3_BUCKET_FILE_PATH }}
            BACKUP_ID: ${{ inputs.backup_id || vars.BACKUP_ID }}
            RESTORE_CLUSTER: ${{ inputs.restore_cluster || 'only-restore-data' }}
            RESTORE_CLUSTER_VERSION: ${{ inputs.restore_cluster_version || vars.RESTORE_CLUSTER_VERSION }}
            RESTORE_S3_BUCKET: ${{ inputs.restore_s3_bucket || vars.RESTORE_S3_BUCKET }}
            RESTORE_S3_BUCKET_FILE_PATH: ${{ steps.set-restore-path.outputs.path }}
          continue-on-error: true

        - name: Restore MOC Data (from dev)
          id: restore-dev
          if: inputs.backup_env == 'dev'
          run: |
            cd $GITHUB_WORKSPACE
            export PYTHONPATH=$(pwd)
            python src/upgrade/main.py restore --only-data
          env:
            ALIYUN_SECRET_NAME: aliyun-moc-backup-dev
            BACKUP_ALIYUN_AK: ${{ secrets.RESTORE_ALIYUN_AK }}
            BACKUP_ALIYUN_SK: ${{ secrets.RESTORE_ALIYUN_SK }}
            RESTORE_ALIYUN_AK: ${{ secrets.RESTORE_ALIYUN_AK }}
            RESTORE_ALIYUN_SK: ${{ secrets.RESTORE_ALIYUN_SK }}
            BACKUP_S3_BUCKET: ${{ inputs.backup_s3_bucket || vars.DEV_BACKUP_S3_BUCKET }}
            BACKUP_S3_BUCKET_FILE_PATH: ${{ inputs.backup_s3_bucket_file_path || vars.DEV_BACKUP_S3_BUCKET_FILE_PATH }}
            BACKUP_ID: ${{ inputs.backup_id || vars.DEV_BACKUP_ID }}
            RESTORE_CLUSTER: ${{ inputs.restore_cluster || 'only-restore-data' }}
            RESTORE_CLUSTER_VERSION: ${{ inputs.restore_cluster_version || vars.RESTORE_CLUSTER_VERSION }}
            RESTORE_S3_BUCKET: ${{ inputs.restore_s3_bucket || vars.RESTORE_S3_BUCKET }}
            RESTORE_S3_BUCKET_FILE_PATH: ${{ steps.set-restore-path.outputs.path }}

        - name: Restore MOC Data Again (from prod)
          if: inputs.backup_env != 'dev' && steps.restore-prod.outcome == 'failure'
          run: |
            cd $GITHUB_WORKSPACE
            export PYTHONPATH=$(pwd)
            python src/upgrade/main.py restore --only-data
          env:
            BACKUP_ALIYUN_AK: ${{ secrets.BACKUP_ALIYUN_AK }}
            BACKUP_ALIYUN_SK: ${{ secrets.BACKUP_ALIYUN_SK }}
            RESTORE_ALIYUN_AK: ${{ secrets.RESTORE_ALIYUN_AK }}
            RESTORE_ALIYUN_SK: ${{ secrets.RESTORE_ALIYUN_SK }}
            BACKUP_S3_BUCKET: ${{ inputs.backup_s3_bucket || vars.BACKUP_S3_BUCKET }}
            BACKUP_S3_BUCKET_FILE_PATH: ${{ inputs.backup_s3_bucket_file_path || vars.BACKUP_S3_BUCKET_FILE_PATH }}
            BACKUP_ID: ${{ inputs.backup_id || vars.BACKUP_ID }}
            RESTORE_CLUSTER: ${{ inputs.restore_cluster || 'only-restore-data' }}
            RESTORE_CLUSTER_VERSION: ${{ inputs.restore_cluster_version || vars.RESTORE_CLUSTER_VERSION }}
            RESTORE_S3_BUCKET: ${{ inputs.restore_s3_bucket || vars.RESTORE_S3_BUCKET }}
            RESTORE_S3_BUCKET_FILE_PATH: ${{ steps.set-restore-path.outputs.path }}

        - name: Upload Logs
          uses: actions/upload-artifact@v4
          if: always()
          with:
            name: upgrade-test-logs
            path: |
              ${{ github.workspace }}/*.log
            retention-days: 7
