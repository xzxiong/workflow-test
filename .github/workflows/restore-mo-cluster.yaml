name: Restore MO Cluster
on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - qa
        default: dev
      backup_s3_bucket:
        description: Backup S3 bucket (source of data)
        required: true
        type: string
      backup_s3_bucket_file_path:
        description: Backup S3 bucket path
        required: true
        type: string
      backup_id:
        description: Backup ID
        required: true
        type: string
      restore_cluster:
        description: Cluster name to create
        required: false
        type: string
        default: only-restore-data
      restore_cluster_version:
        description: MO version for the restored cluster
        required: true
        type: string
        default: 'nightly-9d616832a'
      restore_s3_bucket:
        description: Restore S3 bucket (where data was copied to)
        required: true
        type: string
        default: 'moc-backup-test'
      restore_s3_bucket_file_path:
        description: Restore S3 bucket path (output of restore-mo-data)
        required: true
        type: string
env:
  env: ${{ inputs.env || 'dev' }}
  provider: aliyun
  region: cn-hangzhou
  k8s_unit_config: ${{ secrets.K8S_UNIT_CONFIG }}
  k8s_controller_config: ${{ secrets.K8S_CONTROLLER_CONFIG }}
jobs:
    restore-cluster:
      runs-on: ubuntu-latest
      environment:
        name: ${{ inputs.env || 'dev' }}
      timeout-minutes: 120

      steps:
        - name: Checkout
          uses: actions/checkout@v4
          with:
            repository: matrixorigin/mocloud-tester
            ref: xzxiong
            token: ${{ secrets.GH_PAT }}

        - name: Set Up Python3.11
          uses: actions/setup-python@v6
          with:
            python-version: '3.11'

        - name: Install Python Dependencies
          run: |
            cd $GITHUB_WORKSPACE
            python -m pip install --upgrade pip
            pip install -r requirements.txt

        - name: Restore MO Cluster
          id: restore
          run: |
            cd $GITHUB_WORKSPACE
            export PYTHONPATH=$(pwd)
            python src/upgrade/main.py restore --force
          env:
            BACKUP_ALIYUN_AK: ${{ secrets.BACKUP_ALIYUN_AK }}
            BACKUP_ALIYUN_SK: ${{ secrets.BACKUP_ALIYUN_SK }}
            RESTORE_ALIYUN_AK: ${{ secrets.RESTORE_ALIYUN_AK }}
            RESTORE_ALIYUN_SK: ${{ secrets.RESTORE_ALIYUN_SK }}
            BACKUP_S3_BUCKET: ${{ inputs.backup_s3_bucket }}
            BACKUP_S3_BUCKET_FILE_PATH: ${{ inputs.backup_s3_bucket_file_path }}
            BACKUP_ID: ${{ inputs.backup_id }}
            RESTORE_CLUSTER: ${{ inputs.restore_cluster }}
            RESTORE_CLUSTER_VERSION: ${{ inputs.restore_cluster_version || vars.MO_IMAGE_TAG }}
            RESTORE_S3_BUCKET: ${{ inputs.restore_s3_bucket }}
            RESTORE_S3_BUCKET_FILE_PATH: ${{ inputs.restore_s3_bucket_file_path }}
            MO_IMAGE_REPOSITORY: ${{ vars.MO_IMAGE_REPOSITORY }}
            RESTORE_MOC_PLUGIN_TAG: ${{ vars.RESTORE_MOC_PLUGIN_TAG }}

        - name: Upload Logs
          uses: actions/upload-artifact@v4
          if: always()
          with:
            name: restore-cluster-logs
            path: |
              ${{ github.workspace }}/*.log
            retention-days: 7
