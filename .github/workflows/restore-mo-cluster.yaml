name: Restore MO Cluster
on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - qa
        default: dev
      restore_s3_bucket_file_path:
        description: 'Restore S3 path (output of restore-mo-data workflow)'
        required: true
        type: string
      restore_cluster:
        description: Restore cluster name
        required: false
        type: string
        default: restore-2dev
      restore_cluster_version:
        description: MO version for the restored cluster
        required: false
        type: string
env:
  env: ${{ inputs.env || 'dev' }}
  provider: aliyun
  region: cn-hangzhou
  k8s_unit_config: ${{ secrets.K8S_UNIT_CONFIG }}
  k8s_controller_config: ${{ secrets.K8S_CONTROLLER_CONFIG }}
jobs:
    restore-cluster:
      runs-on: ubuntu-latest
      environment:
        name: ${{ inputs.env || 'dev' }}
      timeout-minutes: 120

      steps:
        - name: Checkout
          uses: actions/checkout@v4
          with:
            repository: matrixorigin/mocloud-tester
            ref: xzxiong
            token: ${{ secrets.GH_PAT }}

        - name: Set Up Python3.11
          uses: actions/setup-python@v6
          with:
            python-version: '3.11'

        - name: Install Python Dependencies
          run: |
            cd $GITHUB_WORKSPACE
            python -m pip install --upgrade pip
            pip install -r requirements.txt

        - name: Restore MO Cluster
          id: restore
          run: |
            cd $GITHUB_WORKSPACE
            export PYTHONPATH=$(pwd)
            python src/upgrade/main.py restore --force
          env:
            RESTORE_ALIYUN_AK: ${{ secrets.RESTORE_ALIYUN_AK }}
            RESTORE_ALIYUN_SK: ${{ secrets.RESTORE_ALIYUN_SK }}
            RESTORE_CLUSTER: ${{ inputs.restore_cluster || 'restore-2dev' }}
            RESTORE_CLUSTER_VERSION: ${{ inputs.restore_cluster_version || vars.MO_IMAGE_TAG }}
            RESTORE_S3_BUCKET: ${{ vars.RESTORE_S3_BUCKET }}
            RESTORE_S3_BUCKET_FILE_PATH: ${{ inputs.restore_s3_bucket_file_path }}
            MO_IMAGE_REPOSITORY: ${{ vars.MO_IMAGE_REPOSITORY }}
            RESTORE_MOC_PLUGIN_TAG: ${{ vars.RESTORE_MOC_PLUGIN_TAG }}

        - name: Upload Logs
          uses: actions/upload-artifact@v4
          if: always()
          with:
            name: restore-cluster-logs
            path: |
              ${{ github.workspace }}/*.log
            retention-days: 7
